name: river_flow
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  vibration: ^3.1.3
  cupertino_icons: ^1.0.8
  
  # Added for the emergency alert sound
  audioplayers: ^6.1.0

  # Charts for analytics screen.
  fl_chart: ^1.0.0

  # Firebase packages
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.10
  firebase_database: ^11.0.0 

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    # Added folder for your alert sound files
    - assets/sounds/sounds.wav